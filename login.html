<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- ── CUSTOMIZE: page/tab title ── -->
<title>OneStream 365 — Sign in</title>
<link rel="icon" href="logo.png" />
<style>
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}
  :root{ --font:'OneStream Sans',Arial,Helvetica,sans-serif;
         --brand:#0A5DFF; --brand-hover:#0847c9; --text:#141414; --muted:#6E6E6E; --border:#BDBDBD; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font);display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 50% -10%,#eef2fb 0%,#f4f5f8 55%,#eef0f4 100%);}
  .card{width:360px;max-width:100%;background:#fff;border:1px solid #E6E6E6;border-radius:12px;
    box-shadow:0 18px 50px rgba(20,30,60,.14);padding:32px 28px 28px;text-align:center;}
  .brand{margin:4px auto 20px;}
  .brand img{width:190px;max-width:80%;height:auto;display:block;margin:0 auto;}
  h1{font-size:20px;font-weight:700;color:var(--text);margin:0 0 6px;}
  p.sub{font-size:13px;font-weight:400;color:var(--muted);margin:0 0 20px;line-height:18px;}
  .err{color:#890C1D;background:#F9E8EB;border-radius:6px;font-size:13px;padding:8px 10px;margin:0 0 12px;text-align:left;}
  .pw-row{position:relative;margin-bottom:12px;}
  input{width:100%;height:40px;border:1px solid var(--border);border-radius:4px;padding:0 40px 0 12px;
    font-size:14px;font-family:inherit;color:var(--text);outline:none;}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(10,93,255,.14);}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:30px;height:30px;border:0;
    background:none;cursor:pointer;color:#8A8A8A;display:flex;align-items:center;justify-content:center;padding:0;}
  .pw-toggle:hover{color:var(--text);}
  .pw-toggle svg{width:18px;height:18px;display:block;}
  button.submit{width:100%;height:40px;border:0;border-radius:4px;background:var(--brand);color:#fff;
    font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
  button.submit:hover{background:var(--brand-hover);}
</style>
</head>
<body>
  <form class="card" method="POST" action="/api/login" autocomplete="off">
    <div class="brand"><img src="brandmark.svg" alt="OneStream" onerror="this.style.display='none'"></div>
    <!-- ── CUSTOMIZE: title + subtitle ── -->
    <h1>OneStream 365 — Excel Add-In</h1>
    <p class="sub">Strictly confidential. Authorized users only.</p>

    <div class="err" id="err" style="display:none">Incorrect password. Please try again.</div>
    <div class="pw-row">
      <input id="pw" type="password" name="password" placeholder="Enter password"
             autocomplete="current-password" aria-label="Password" autofocus required />
      <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password"></button>
    </div>
    <button type="submit" class="submit">Unlock</button>
  </form>
<script>
  // Show the error banner when the login API bounces back with ?e=1
  if (new URLSearchParams(location.search).get('e')) document.getElementById('err').style.display='block';

  // Show / hide password eye toggle
  var pw = document.getElementById('pw'), tog = document.getElementById('pw-toggle');
  var EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  var EYEOFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.9 4.24A10.9 10.9 0 0 1 12 4c6.5 0 10 7 10 7a13.4 13.4 0 0 1-1.67 2.36M6.6 6.6C3.9 8.23 2 12 2 12s3.6 7 10 7a10.9 10.9 0 0 0 3.4-.54"/></svg>';
  tog.innerHTML = EYE;
  tog.addEventListener('click', function(){
    var show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    tog.innerHTML = show ? EYEOFF : EYE;
    tog.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    pw.focus();
  });
</script>
</body>
</html>
