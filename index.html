<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneStream 365 — Excel Add-In</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f3f3f3;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /* Fills the browser and centers the scaled frame */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /* Reserves the *scaled* footprint so centering stays correct */
  .sizer {
    width: calc(1440px * var(--s, 1));
    height: calc(820px * var(--s, 1));
  }

  /* ---- Frame: 1440 x 820 (1:1 from Figma), scaled to fit ---- */
  .frame {
    position: relative;
    width: 1440px;
    height: 820px;
    transform: scale(var(--s, 1));
    transform-origin: top left;
    background-image: url("assets/bg.png");
    background-size: 1440px 820px;
    background-repeat: no-repeat;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  /* ---- OneStream Ribbon (Action Ribbon - Main) ---- */
  .ribbon {
    position: absolute;
    left: 0;
    top: 64px;
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .group        { display: flex; flex-direction: column; align-items: center; }
  .group-solo   { display: flex; flex-direction: column; align-items: center;
                  justify-content: space-between; height: 87px; }
  .group-tall   { display: flex; flex-direction: column; align-items: center; height: 89px; }

  .group-row       { display: flex; gap: 7px; align-items: center;  margin-bottom: -3px; }
  .group-row.top   { align-items: flex-start; }

  .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 5px 0;
    width: 60px;
  }
  .icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon img { display: block; }

  .label {
    width: 100%;
    font-size: 9.5px;
    line-height: normal;
    color: #000;
    text-align: center;
    word-break: break-word;
  }
  .label.s9 { font-size: 9px; }

  .caret       { width: 8px; height: 5px; flex-shrink: 0; }
  .caret img   { display: block; width: 8px; height: 5px; }

  .caption {
    font-size: 10px;
    line-height: normal;
    color: #000;
    text-align: center;
    white-space: nowrap;
  }
  .caption.spacer { opacity: 0; width: 60px; white-space: normal; }

  .sep { width: 1px; height: 91px; background: #D4D4D4; flex-shrink: 0; }

  /* ---- Task pane overlay ---- */
  .pane-title {
    position: absolute;
    left: 1130px;
    top: 217px;
    font-size: 18px;
    line-height: normal;
    color: #000;
    white-space: nowrap;
  }
  .pane-body {
    position: absolute;
    left: 1130px;
    top: 246px;
    width: 296px;
    height: 540px;
    background: #ffffff;
  }
</style>
</head>
<body>
  <div class="stage">
   <div class="sizer">
    <div class="frame">

      <!-- ============ OneStream Ribbon ============ -->
      <div class="ribbon">

        <!-- Access -->
        <div class="group">
          <div class="group-row">
            <div class="item">
              <div class="icon"><img src="assets/icons/login.svg" width="24" height="24" alt=""></div>
              <div class="label">Log<br>In</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/logout.svg" width="23" height="24" alt=""></div>
              <div class="label">Log<br>Out</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/changeapp.svg" width="24" height="24" alt=""></div>
              <div class="label">Change<br>Application</div>
              <div class="caret"></div>
            </div>
          </div>
          <div class="caption">Access</div>
        </div>

        <div class="sep"></div>

        <!-- Add Artifact -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/addartifact.svg" width="20.8" height="20.8" alt=""></div>
            <div class="label">Add<br>Artifact</div>
            <div class="caret"><img src="assets/icons/arrow_b.svg" alt=""></div>
          </div>
          <div class="caption spacer">Explore</div>
        </div>

        <div class="sep"></div>

        <!-- Refresh -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/refresh.svg" width="24" height="18.75" alt=""></div>
            <div class="label">Refresh</div>
            <div class="caret"><img src="assets/icons/arrow_b.svg" alt=""></div>
          </div>
          <div class="caption spacer">Refresh</div>
        </div>

        <div class="sep"></div>

        <!-- Submit -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/submit.svg" width="24" height="24" alt=""></div>
            <div class="label">Submit</div>
            <div class="caret"><img src="assets/icons/arrow_b.svg" alt=""></div>
          </div>
          <div class="caption spacer">Submit</div>
        </div>

        <div class="sep"></div>

        <!-- Calculation -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/calculation.svg" width="24" height="24" alt=""></div>
            <div class="label">Calculation</div>
            <div class="caret"><img src="assets/icons/arrow_b.svg" alt=""></div>
          </div>
          <div class="caption spacer">Submit</div>
        </div>

        <div class="sep"></div>

        <!-- Analysis -->
        <div class="group-tall">
          <div class="group-row top">
            <div class="item">
              <div class="icon"><img src="assets/icons/analysis.svg" width="24" height="24" alt=""></div>
              <div class="label">Analysis</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/copypov.svg" width="24" height="24" alt=""></div>
              <div class="label s9">Copy POV From Data Cell</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/pastepov.svg" width="24" height="24" alt=""></div>
              <div class="label s9">Paste POV as XFGetCell</div>
              <div class="caret"></div>
            </div>
          </div>
          <div class="caption">Analysis</div>
        </div>

        <div class="sep"></div>

        <!-- General -->
        <div class="group-tall">
          <div class="group-row top">
            <div class="item">
              <div class="icon"><img src="assets/icons/parameters.svg" width="24" height="24" alt=""></div>
              <div class="label">Parameters</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/insheet.svg" width="23.9" height="23.9" alt=""></div>
              <div class="label s9">In-Sheet Actions</div>
              <div class="caret"></div>
            </div>
            <div class="item">
              <div class="icon"><img src="assets/icons/taskactivity.svg" width="24" height="24" alt=""></div>
              <div class="label s9">Task Activity</div>
              <div class="caret"></div>
            </div>
          </div>
          <div class="caption">Genera;</div>
        </div>

        <div class="sep"></div>

        <!-- Show Pane -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/showpane.svg" width="19.2" height="19.2" alt=""></div>
            <div class="label">Show Pane</div>
            <div class="caret"></div>
          </div>
          <div class="caption spacer">Pane</div>
        </div>

        <div class="sep"></div>

        <!-- Preferences -->
        <div class="group-solo">
          <div class="item">
            <div class="icon"><img src="assets/icons/preferences.svg" width="23" height="24" alt=""></div>
            <div class="label">Preferences</div>
            <div class="caret"></div>
          </div>
          <div class="caption spacer">Explore</div>
        </div>

      </div>
      <!-- ============ /Ribbon ============ -->

      <!-- Task pane -->
      <div class="pane-body"></div>
      <div class="pane-title">OneStream 365</div>

    </div>
   </div>
  </div>

  <script>
    // Scale the 1440x820 frame to fit the browser while preserving aspect ratio
    (function () {
      var BASE_W = 1440, BASE_H = 820;
      function fit() {
        var s = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
        document.documentElement.style.setProperty('--s', s);
      }
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();
  </script>
</body>
</html>
